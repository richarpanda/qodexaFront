<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- ── Primary SEO ──────────────────────────────────────────────────── -->
  <title>Qodexa — Desarrollo de Software a Medida para Empresas</title>
  <meta name="description"
    content="Qodexa es tu socio tecnológico. Creamos software a medida, plataformas web, apps móviles, APIs, soluciones cloud e inteligencia artificial para empresas que quieren crecer." />
  <meta name="keywords"
    content="desarrollo de software a medida, empresa de software, plataformas web, apps móviles, APIs, integraciones, soluciones cloud, inteligencia artificial, chatbots, automatización, Mexico" />
  <meta name="author" content="Qodexa" />
  <meta name="robots" content="index, follow" />
  <link rel="canonical" href="https://qodexa.com.mx" />

  <!-- ── Open Graph (Facebook, LinkedIn, WhatsApp preview) ───────────── -->
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://qodexa.com.mx" />
  <meta property="og:title" content="Qodexa — Desarrollo de Software a Medida para Empresas" />
  <meta property="og:description"
    content="Creamos sistemas, apps, plataformas web, APIs, soluciones cloud e inteligencia artificial. Tu socio tecnológico de principio a fin." />
  <meta property="og:image" content="https://qodexa.com.mx/og-image.png" />
  <meta property="og:locale" content="es_MX" />
  <meta property="og:site_name" content="Qodexa" />

  <!-- ── Favicon ──────────────────────────────────────────────────────── -->
  <link rel="icon" type="image/x-icon" href="/src/assets/favicon.ico" />
  <link rel="apple-touch-icon" sizes="180x180" href="/src/assets/favicon.ico" />
  <meta name="theme-color" content="#000000" />

  <!-- ── Schema.org structured data (Google rich results) ────────────── -->
  <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "Qodexa",
      "url": "https://qodexa.com.mx",
      "logo": "https://qodexa.com.mx/src/assets/logo.png",
      "description": "Empresa de desarrollo de software a medida. Creamos sistemas, apps, plataformas web, APIs, soluciones cloud e inteligencia artificial.",
      "address": {
        "@type": "PostalAddress",
        "addressCountry": "MX"
      },
      "contactPoint": {
        "@type": "ContactPoint",
        "contactType": "sales",
        "availableLanguage": "Spanish"
      },
      "sameAs": [
        "https://linkedin.com/company/qodexa",
        "https://instagram.com/qodexa"
      ],
      "offers": {
        "@type": "Offer",
        "description": "Desarrollo de software a medida, plataformas web, apps móviles, APIs, cloud e IA"
      }
    }
    </script>

  <!-- ── Fonts ─────────────────────────────────────────────────────────── -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Inter:wght@300;400;500;600&display=swap"
    rel="stylesheet" />
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
